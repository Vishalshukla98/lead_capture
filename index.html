<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telkosh Newsletter</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
width:100%;
max-width:450px;
}

h1{
margin-bottom:10px;
}

.lead{
color:#666;
margin-bottom:20px;
}

form{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

button{
padding:12px 18px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:disabled{
opacity:.7;
cursor:not-allowed;
}

#message{
margin-top:15px;
font-weight:600;
}
</style>

</head>
<body>

<div class="card">

<h1>Join the Telkosh Newsletter</h1>

<p class="lead">
Get updates and exclusive offers. No spam.
</p>

<form id="subscribeForm">

<input
type="email"
id="email"
placeholder="Enter your email"
required
>

<button type="submit" id="btn">
Subscribe
</button>

</form>

<p id="message"></p>

</div>

<script>

const form = document.getElementById("subscribeForm");

form.addEventListener("submit", subscribe);

async function subscribe(e){

e.preventDefault();

const email = document.getElementById("email").value.trim();

const btn = document.getElementById("btn");

const message = document.getElementById("message");

btn.disabled = true;
btn.innerText = "Subscribing...";

message.innerHTML = "";

try{

const response = await fetch(
"https://lead-capture-xje5.onrender.com/subscribe",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email
})
}
);

const data = await response.json();

if(data.success){

message.style.color = "green";

message.innerHTML =
"✅ Thank you for subscribing!";

document.getElementById("email").value = "";

}else{

message.style.color = "red";

message.innerHTML =
data.message || "Subscription failed";

}

}catch(error){

console.error(error);

message.style.color = "red";

message.innerHTML =
"❌ Server connection error";

}

btn.disabled = false;
btn.innerText = "Subscribe";

}

</script>

</body>
</html>
